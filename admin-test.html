<!DOCTYPE html>
<html>
<head>
    <title>Admin Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #1f2937; color: white; }
        .container { max-width: 600px; margin: 0 auto; }
        .form-group { margin: 20px 0; }
        label { display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #4b5563; background: #374151; color: white; }
        button { background: #3b82f6; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #2563eb; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .success { background: #065f46; border: 1px solid #10b981; }
        .error { background: #7f1d1d; border: 1px solid #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Login & Ticket Test</h1>
        
        <div class="form-group">
            <label>Admin Email:</label>
            <input type="email" id="email" placeholder="Enter admin email">
        </div>
        
        <div class="form-group">
            <label>Admin Password:</label>
            <input type="password" id="password" placeholder="Enter admin password">
        </div>
        
        <button onclick="login()">Login & Check Tickets</button>
        
        <div id="result"></div>
    </div>

    <script>
        async function login() {
            const result = document.getElementById('result');
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                result.innerHTML = '<div class="result error">❌ Please provide admin email and password.</div>';
                return;
            }

            result.innerHTML = '<div class="result">Logging in...</div>';
            
            try {
                // Step 1: Login
                const loginResponse = await fetch('http://localhost:5000/api/v1/admin/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        password
                    })
                });
                
                if (!loginResponse.ok) {
                    throw new Error(`Login failed: ${loginResponse.status}`);
                }
                
                const loginData = await loginResponse.json();
                const token = loginData.accessToken;
                
                // Step 2: Get tickets
                const ticketsResponse = await fetch('http://localhost:5000/api/v1/admin/support/tickets', {
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json' 
                    }
                });
                
                if (!ticketsResponse.ok) {
                    throw new Error(`Tickets fetch failed: ${ticketsResponse.status}`);
                }
                
                const tickets = await ticketsResponse.json();
                
                // Step 3: Display results
                let html = '<div class="result success">';
                html += '<h3>✅ Login Successful!</h3>';
                html += '<h4>Support Tickets Found:</h4>';
                
                if (tickets.length === 0) {
                    html += '<p>No tickets found. Submit a test ticket first.</p>';
                } else {
                    html += '<ul>';
                    tickets.forEach(ticket => {
                        html += `<li><strong>#${ticket.id}</strong> - ${ticket.subject} - ${ticket.name} (${ticket.email})</li>`;
                    });
                    html += '</ul>';
                }
                
                html += '</div>';
                result.innerHTML = html;
                
            } catch (error) {
                result.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
