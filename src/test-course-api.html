<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .test-section { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .result { margin-top: 10px; padding: 10px; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f5f5f5; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Course API Diagnostic Test</h1>
        
        <div class="test-section">
            <h3>1. Test Authentication</h3>
            <button onclick="testAuth()">Test Authentication</button>
            <div id="auth-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>2. Test Course Loading</h3>
            <input type="number" id="courseId" placeholder="Enter Course ID" style="width: 200px; padding: 5px;">
            <button onclick="testCourseLoad()">Load Course</button>
            <div id="course-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>3. Test Categories API</h3>
            <button onclick="testCategories()">Load Categories</button>
            <div id="categories-result" class="result"></div>
        </div>
        
        <div class="test-section">
            <h3>4. Console Logs</h3>
            <button onclick="clearLogs()">Clear Logs</button>
            <div id="logs"></div>
        </div>
    </div>

    <script>
        let authToken = localStorage.getItem('accessToken');
        
        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            if (logs) {
                const timestamp = new Date().toLocaleTimeString();
                logs.innerHTML += `<div>[${timestamp}] ${type.toUpperCase()}: ${message}</div>`;
                logs.scrollTop = logs.scrollHeight;
            }
        }
        
        async function testAuth() {
            const result = document.getElementById('auth-result');
            if (!authToken) {
                result.innerHTML = '<span class="error">No auth token found</span>';
                return;
            }
            
            try {
                const response = await fetch('http://localhost:5000/api/v1/admin/test-auth', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                if (response.ok) {
                    result.innerHTML = '<span class="success">Auth working</span>';
                } else {
                    result.innerHTML = '<span class="error">Auth failed</span>';
                }
            } catch (error) {
                result.innerHTML = `<span class="error">Auth error: ${error.message}</span>`;
            }
        }
        
        async function testCourseLoad() {
            const courseId = document.getElementById('courseId').value;
            const result = document.getElementById('course-result');
            
            if (!authToken || !courseId) {
                result.innerHTML = '<span class="error">Missing auth token or course ID</span>';
                return;
            }
            
            try {
                log(`Testing course load for ID: ${courseId}`);
                const response = await fetch(`http://localhost:5000/api/v1/admin/courses/${courseId}`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                const data = await response.json();
                log(`Course API response: ${JSON.stringify(data, null, 2)}`);
                
                if (response.ok && data.success) {
                    result.innerHTML = `<span class="success">Course loaded successfully</span>`;
                } else {
                    result.innerHTML = `<span class="error">Failed: ${response.status} - ${data.message || 'Unknown error'}</span>`;
                }
            } catch (error) {
                result.innerHTML = `<span class="error">Error: ${error.message}</span>`;
                log(`Course load error: ${error.message}`);
            }
        }
        
        async function testCategories() {
            const result = document.getElementById('categories-result');
            
            if (!authToken) {
                result.innerHTML = '<span class="error">No auth token</span>';
                return;
            }
            
            try {
                log('Testing categories API...');
                const response = await fetch('http://localhost:5000/api/v1/admin/categories', {
                    headers: {
                        'Authorization': `Bearer ${authToken}`
                    }
                });
                
                const data = await response.json();
                log(`Categories API response: ${JSON.stringify(data, null, 2)}`);
                
                if (response.ok) {
                    result.innerHTML = `<span class="success">Categories loaded: ${data.data?.length || 0} items</span>`;
                } else {
                    result.innerHTML = `<span class="error">Failed: ${response.status}</span>`;
                }
            } catch (error) {
                result.innerHTML = `<span class="error">Error: ${error.message}</span>`;
                log(`Categories error: ${error.message}`);
            }
        }
        
        function clearLogs() {
            document.getElementById('logs').innerHTML = '';
        }
        
        // Auto-test on load
        if (authToken) {
            log('Page loaded with auth token');
            testAuth();
        }
    </script>
</body>
</html>
